name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config commit.gpgsign false

      - name: Bump patch version
        run: |
          pnpm version patch --no-git-tag-version
          node version-bump.mjs
          git add package.json manifest.json versions.json

      - name: Read release version
        id: version
        run: node -e 'console.log("version=" + require("./package.json").version)' >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        run: |
          git commit -m "[skip ci] bump version to ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Build release artifacts
        run: pnpm run build

      - name: Create tag
        run: |
          git tag "${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.version }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_BODY: ${{ github.event.head_commit.message }}
        run: |
          printf '%s\n' "$RELEASE_BODY" > release-notes.md
          gh release create "${{ steps.version.outputs.version }}" \
            manifest.json main.js styles.css \
            --title "${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
